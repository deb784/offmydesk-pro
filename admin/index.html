<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Content Manager | Off My Desk Professionals</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #011126; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .loading { text-align: center; }
    .loading p { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 12px; }
    .dot { display: inline-block; width: 8px; height: 8px; background: #A4FF0F; border-radius: 50%; margin: 0 3px; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-10px)} }
  </style>
</head>
<body>
  <div class="loading">
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <p>Loading Content Manager...</p>
  </div>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
</body>
</html>
