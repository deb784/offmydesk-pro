[build]
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# =============================================
# NETLIFY CMS — Required services
# Enable these in your Netlify dashboard:
#   Site Settings > Identity > Enable
#   Site Settings > Identity > Services > Git Gateway > Enable
# =============================================

# Form handling
[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

# Netlify CMS admin
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Security and performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# HTML — no cache so updates go live immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
